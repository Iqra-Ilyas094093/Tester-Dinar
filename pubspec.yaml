name: dinar_app
description: Dinar Airport Transfers Mobile Application
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # HTTP Client
  dio: ^5.3.0

  # Stripe Payment (Passenger only)
  flutter_stripe: ^10.0.0

  # Maps & Location
  google_maps_flutter: ^2.5.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.8.0

  # Authentication
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.0.0

  # Storage
  shared_preferences: ^2.2.0

  # Image Picker
  image_picker: ^1.1.2
  
  # UI Components
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  calendar_date_picker2: ^1.0.0
  lottie: ^2.7.0

  # PDF & Sharing
  pdf: ^3.10.0
  share_plus: ^7.2.0

  # Fonts
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.18.0
  url_launcher: ^6.2.0
  permission_handler: ^11.1.0

  # Driver Features
  background_locator_2: ^2.0.6
  fl_chart: ^0.65.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Note: Assets directories are optional - uncomment and create folders when needed
  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/icons/
